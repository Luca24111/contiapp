name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PHP_VERSION: "8.1"

jobs:
  validate:
    name: Validate Symfony
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: contiapp_test
          MYSQL_USER: contiapp
          MYSQL_PASSWORD: contiapp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: ctype, iconv, intl, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint Symfony container
        env:
          APP_ENV: prod
          APP_DEBUG: "0"
          APP_SECRET: test-secret
          APP_DEFAULT_URI: http://localhost
          TRUSTED_PROXIES: 127.0.0.1,REMOTE_ADDR
          TRUSTED_HOSTS: ^localhost$
          DATABASE_URL: mysql://contiapp:contiapp@127.0.0.1:3306/contiapp_test?serverVersion=8.0.36&charset=utf8mb4
          MYSQL_SSL_CA: ""
        run: |
          php bin/console lint:container --env=prod --no-debug
          php bin/console lint:twig templates --env=prod --no-debug

      - name: Run migrations
        env:
          APP_ENV: test
          APP_SECRET: test-secret
          DATABASE_URL: mysql://contiapp:contiapp@127.0.0.1:3306/contiapp?serverVersion=8.0.36&charset=utf8mb4
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: contiapp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger deploy hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "${response}" != "200" ] && [ "${response}" != "201" ]; then
            echo "Render deploy hook fallito con status ${response}"
            exit 1
          fi
